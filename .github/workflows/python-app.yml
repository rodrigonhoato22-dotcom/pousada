name: Python application

on:
  push:
    branches: [ "main", "feature/entrega-cicd" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic pytest httpx
        
    - name: Test with pytest
      run: |
        # Agora o pytest vai procurar qualquer arquivo que comece com test_ na raiz
        pytest
        
    - name: Alerta de Status (Semana 6)
      if: always()
      run: |
        echo "### Status do Workflow: ${{ job.status }} ✅" >> $GITHUB_STEP_SUMMARY
