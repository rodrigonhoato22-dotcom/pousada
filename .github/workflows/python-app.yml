name: Python application

on:
  push:
    branches: [ "main", "feature/entrega-cicd" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic pytest httpx
        
    - name: Test with pytest
      run: |
        # O comando 'find' vai listar onde estão seus arquivos para o log (ajuda no debug)
        find . -maxdepth 3 -not -path '*/.*'
        
        # Forçamos o pytest a procurar em todas as subpastas
        # Se o seu arquivo se chama 'teste_main.py', precisamos avisar o pytest
        pytest **/teste_main.py **/test_main.py || pytest teste_main.py
        
    - name: Alerta de Status (Semana 6)
      if: always()
      run: |
        echo "### Status do Workflow: ${{ job.status }} ✅" >> $GITHUB_STEP_SUMMARY
