name: Python application

on:
  push:
    branches: [ "main", "feature/entrega-cicd" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic pytest httpx
        
    - name: Test with pytest
      run: |
        # Localiza o arquivo test_main.py e roda o pytest diretamente nele
        TEST_FILE=$(find . -name "test_main.py" | head -n 1)
        if [ -z "$TEST_FILE" ]; then
          echo "ERRO: Arquivo test_main.py não encontrado!"
          exit 1
        fi
        echo "Rodando testes em: $TEST_FILE"
        pytest "$TEST_FILE"
        
    - name: Alerta de Status (Semana 6)
      if: always()
      run: |
        echo "### Status do Workflow: ${{ job.status }} ✅" >> $GITHUB_STEP_SUMMARY
